<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — MERALEY</title>
    <link rel="icon" href="/icons/logo2.ico" type="image/x-icon">
    <link rel="stylesheet" href="/styles/signs.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="page-signin">

    <div class="sign-wrapper">

        <!-- Panel decorativo izquierdo -->
        <div class="sign-panel">
            <h2 class="panel-title">¿Aún no tienes cuenta?</h2>
            <p class="panel-sub">Únete a MERALEY y descubre nuestras mermeladas. Ofertas exclusivas, novedades y mucho más.</p>
            <a href="signup.html" class="panel-link">Crear cuenta</a>
        </div>

        <!-- Formulario derecho -->
        <div class="sign-form-wrap">
            <div class="form-logo">
                <a href="/index.html" class="logo">
                    <img src="/logo2.png" alt="Meraley">
                </a>
                <span class="brand-name"><a href="/index.html">MERALEY</a></span>
            </div>

            <h1 class="form-title">Bienvenido de vuelta</h1>
            <p class="form-subtitle">Ingresa tus datos para continuar</p>

            <!-- Mensaje de error/éxito -->
            <div id="auth-msg" class="auth-msg" style="display:none"></div>

            <div class="field-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
            </div>

            <div class="field-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <a href="#" class="forgot-link" id="forgot-link">¿Olvidaste tu contraseña?</a>

            <button class="btn-primary" id="signin-btn">Iniciar sesión</button>

            <div class="or-sep"><span>O</span></div>

            <p class="switch-link">¿No tienes cuenta? <a href="signup.html">Regístrate</a></p>
        </div>
    </div>

<style>
.auth-msg {
  width: 100%;
  max-width: 380px;
  padding: 12px 16px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  margin-bottom: 16px;
  text-align: center;
}
.auth-msg.error { background: #ffeaea; color: #cc0000; border: 1px solid #ffcccc; }
.auth-msg.success { background: #e8f8ee; color: #1a7a3a; border: 1px solid #b2e4c5; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
</style>

<script type="module">
import {
  auth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  sendPasswordResetEmail
} from "/firebase.js";

// Solo redirigir si el usuario acaba de iniciar sesión exitosamente
// (no al cargar la página, para evitar loops si el usuario navega manualmente)

const emailInput = document.getElementById("email");
const passInput  = document.getElementById("password");
const btn        = document.getElementById("signin-btn");
const msg        = document.getElementById("auth-msg");

function showMsg(text, type = "error") {
  msg.textContent = text;
  msg.className = `auth-msg ${type}`;
  msg.style.display = "block";
}

const ERROR_MESSAGES = {
  "auth/user-not-found":     "No existe una cuenta con ese correo.",
  "auth/wrong-password":     "Contraseña incorrecta. Intenta de nuevo.",
  "auth/invalid-email":      "El correo no tiene un formato válido.",
  "auth/too-many-requests":  "Demasiados intentos. Espera un momento e intenta de nuevo.",
  "auth/invalid-credential": "Correo o contraseña incorrectos.",
  "auth/network-request-failed": "Error de red. Revisa tu conexión."
};

btn.addEventListener("click", async () => {
  const email    = emailInput.value.trim();
  const password = passInput.value;

  if (!email || !password) {
    showMsg("Por favor llena todos los campos.");
    return;
  }

  btn.disabled    = true;
  btn.textContent = "Iniciando sesión…";
  msg.style.display = "none";

  try {
    await signInWithEmailAndPassword(auth, email, password);
    showMsg("¡Bienvenido! Redirigiendo…", "success");
    setTimeout(() => window.location.href = "/index.html", 900);
  } catch (err) {
    btn.disabled    = false;
    btn.textContent = "Iniciar sesión";
    showMsg(ERROR_MESSAGES[err.code] || "Ocurrió un error. Intenta de nuevo.");
    console.error(err.code);
  }
});

// Enter para submit
[emailInput, passInput].forEach(el => {
  el.addEventListener("keydown", e => {
    if (e.key === "Enter") btn.click();
  });
});

// Recuperar contraseña
document.getElementById("forgot-link").addEventListener("click", async (e) => {
  e.preventDefault();
  const email = emailInput.value.trim();
  if (!email) {
    showMsg("Escribe tu correo primero para restablecer la contraseña.");
    return;
  }
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg("Te enviamos un enlace para restablecer tu contraseña.", "success");
  } catch (err) {
    showMsg(ERROR_MESSAGES[err.code] || "No se pudo enviar el correo.");
  }
});
</script>
</body>
</html>
