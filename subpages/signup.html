<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="icon" href="/icons/logo2.ico" type="image/x-icon">
    <link rel="stylesheet" href="/styles/signs.css">
</head>
<body>

    <div class="sign-wrapper">
 
        <!-- Formulario izquierdo -->
        <div class="sign-form-wrap">
            <div class="form-logo">
                <a href="/index.html">
                    <img src="/resources/logo2.png" alt="Meraley">
                </a>
                <span class="brand-name">MERALEY</span>
            </div>
 
            <h1 class="form-title">Crea tu cuenta</h1>
            <p class="form-subtitle">Empieza a disfrutar nuestras mermeladas</p>
 
            <div class="field-row">
                <div class="field-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ana" required>
                </div>
                <div class="field-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="García" required>
                </div>
            </div>
 
            <div class="field-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com" required>
            </div>
 
            <div class="field-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
            </div>
 
            <div class="field-group">
                <label for="confirm">Confirmar contraseña</label>
                <input type="password" id="confirm" placeholder="Repite tu contraseña" required>
            </div>
 
            <div class="terms-row">
                <input type="checkbox" id="terms">
                <label for="terms">
                    Acepto los <a href="#">Términos y condiciones</a> y el <a href="#">Aviso de privacidad</a> de MERALEY.
                </label>
            </div>
 
            <button class="btn-primary">Crear cuenta</button>
 
            <div class="or-sep"><span>O</span></div>
 
            <p class="switch-link">¿Ya tienes cuenta? <a href="signin.html">Inicia sesión</a></p>
        </div>
 
        <!-- Panel decorativo derecho -->
        <div class="sign-panel">
            <div class="panel-emoji">🫙</div>
            <h2 class="panel-title">¡Ya tienes cuenta!</h2>
            <p class="panel-sub">Inicia sesión y accede a tus pedidos, historial y ofertas exclusivas para miembros MERALEY.</p>
            <a href="signin.html" class="panel-link">Iniciar sesión</a>
        </div>
    </div>
</body>
</html>
