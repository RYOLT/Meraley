<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="icon" href="/icons/logo2.ico" type="image/x-icon">
    <link rel="stylesheet" href="/styles/signs.css">
</head>
<body>
    <div class="sign-wrapper">
 
        <!-- Panel decorativo izquierdo -->
        <div class="sign-panel">
            <div class="panel-emoji">🍓</div>
            <h2 class="panel-title">¿Aún no tienes cuenta?</h2>
            <p class="panel-sub">Únete a MERALEY y descubre nuestras mermeladas. Ofertas exclusivas, novedades y demas cosas.</p>
            <a href="signup.html" class="panel-link">Crear cuenta</a>
        </div>
 
        <!-- Formulario derecho -->
        <div class="sign-form-wrap">
            <div class="form-logo">
                <a href="/index.html" class="logo">
                    <img src="logo2.png" alt="Meraley">
                </a>
                <span class="brand-name">MERALEY</span>
            </div>
 
            <h1 class="form-title">Bienvenido de vuelta</h1>
            <p class="form-subtitle">Ingresa tus datos para continuar</p>
 
            <div class="field-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com" required>
            </div>
 
            <div class="field-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
 
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
 
            <button class="btn-primary">Iniciar sesión</button>
 
            <div class="or-sep"><span>O</span></div>
 
            <p class="switch-link">¿No tienes cuenta? <a href="signup.html">Regístrate</a></p>
        </div>
    </div>
</body>
</html>
